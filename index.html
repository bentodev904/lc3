<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Modularização de Script </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script type="text/javascript" src="scripts/calcular.js"></script>
    <script type="text/javascript" src="scripts/comparecom5.js"></script>
    <script type="text/javascript" src="scripts/nomeeafins.js"></script>
</head>

<body>
    
    <div class="p-3 my-3 text-center container-sm text-primary-emphasis bg-primary-subtle border border-primary-subtle rounded-3">
        Modularização de Scripts</div>
    <input type="number" id="num" placeholder="Digite o primeiro numero"/>
    <input type="button" value="com5" onclick="compare(document.getElementById('num').value)"/>
    <input type="number" id="num2" placeholder="Digite o segundo numero"/>
    <input type="button" value="com5" onclick="compare(document.getElementById('num2').value)"/>
    <input type="button" id="contar" value="Contas" class="btn btn-outline-success" onclick="maths(document.getElementById('num').value)"/>
    <p id="conta"></p>
    <h2 id="insira"> Insira seu nome </h2>
    <p>
        <input type="text" id="name" placeholder="informe o nome"/>
        <input type="button" value="Envio" id="enviar" onclick="testname(document.getElementById('name').value)">
        <br>
        <input type="button" value="" id="yes" style="background-color:transparent;border:0px;" onclick="yes(document.getElementById('name').value)">
        <input type="button" value="" id="no" style="background-color:transparent;border:0px;" onclick="no(document.getElementById('name').value)">
        <p id="salvar"></p>
    </p>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
                integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
                crossorigin="anonymous"></script>
</body>

</html>
