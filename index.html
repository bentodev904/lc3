<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Modularização de Script </title>
    <link href="style/style.css" type="text/css" rel="stylesheet">
    <script type="text/javascript" src="javascript/primeirocodigo.js"></script>
</head>

<body>
    <div class="content">
    <h1> Modularização de Código </h1>
    <input type="number" id="num">
    <input type="button" value="Alerta" onclick="compare(document.getElementById('num').value);">
    <p id="numero"></p>
    </div>
</body>

</html>
<script type="text/javascript">
    document.getElementById('numero').innerHTML = "Ola";
</script>
